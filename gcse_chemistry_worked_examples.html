<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCSE Chemistry — Worked Examples</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;500;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f5f0;
            --paper: #fffef9;
            --ink: #1a1a2e;
            --ink-light: #4a4a5e;
            --line: #c8d8e8;
            --margin: #e8a0a0;
            --highlight: #fff3cd;
            --explain-bg: #1a1a2e;
            --explain-text: #f0ece4;
            --green: #3b6d11;
            --blue: #185fa5;
            --red: #a32d2d;
            --purple: #534ab7;
            --font: 'Barlow Condensed', sans-serif;
            --mono: 'DM Mono', monospace;
            --hand: 'Caveat', cursive;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1e;
                --paper: #252528;
                --ink: #e8e4dc;
                --ink-light: #a8a49c;
                --line: #3a3a44;
                --margin: #6e3030;
                --highlight: #3a3520;
                --explain-bg: #f0ece4;
                --explain-text: #1a1a2e;
            }
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 1rem;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .question-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .question-nav label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--ink-light);
            margin-right: 4px;
        }

        .q-btn {
            padding: 5px 10px;
            border: 1.5px solid var(--line);
            border-radius: 4px;
            background: var(--paper);
            color: var(--ink);
            font-family: var(--mono);
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .q-btn:hover { border-color: var(--blue); color: var(--blue); }
        .q-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

        .question-box {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 1rem;
            position: relative;
        }

        .question-box .marks {
            position: absolute;
            top: 12px;
            right: 16px;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            background: var(--blue);
            padding: 3px 10px;
            border-radius: 3px;
        }

        .question-box .source {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--ink-light);
            margin-bottom: 8px;
            letter-spacing: 0.04em;
        }

        .question-box .q-text {
            font-size: 15px;
            line-height: 1.5;
            padding-right: 60px;
        }

        .question-box .q-text em {
            font-style: italic;
            color: var(--ink-light);
            font-size: 13px;
        }

        .workspace {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0;
            margin-bottom: 1rem;
            min-height: 300px;
            overflow: hidden;
        }

        .paper-lines {
            padding: 16px 24px 16px 60px;
            position: relative;
            min-height: 300px;
        }

        .paper-lines::before {
            content: '';
            position: absolute;
            left: 50px;
            top: 0;
            bottom: 0;
            width: 1.5px;
            background: var(--margin);
        }

        .answer-line {
            font-family: var(--hand);
            font-size: 22px;
            line-height: 36px;
            color: var(--ink);
            padding: 2px 0;
            border-bottom: 1px solid var(--line);
            min-height: 36px;
            position: relative;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .answer-line.visible { opacity: 1; transform: translateY(0); }
        .answer-line.formula { color: var(--blue); font-weight: 600; }
        .answer-line.substitution { color: var(--ink); }
        .answer-line.result { color: var(--green); font-weight: 700; }
        .answer-line.annotation { color: var(--ink-light); font-size: 16px; font-style: italic; }
        .answer-line.underline-answer {
            color: var(--green);
            font-weight: 700;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
        }

        .mark-tick {
            position: absolute;
            left: -36px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--green);
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s ease 0.3s;
        }

        .answer-line.visible .mark-tick { opacity: 1; }

        .explain-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .explain-overlay.show { display: flex; }

        .explain-bubble {
            background: var(--explain-bg);
            color: var(--explain-text);
            max-width: 500px;
            width: 100%;
            border-radius: 12px;
            padding: 24px 28px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.3);
        }

        .explain-step-num {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.6;
            margin-bottom: 6px;
        }

        .explain-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }

        .explain-body { font-size: 13px; line-height: 1.6; opacity: 0.9; }
        .explain-body strong { color: #7fb3e8; }
        @media (prefers-color-scheme: dark) { .explain-body strong { color: #3b6d11; } }

        .explain-why {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.15);
            font-size: 12px;
            font-style: italic;
            opacity: 0.7;
        }

        @media (prefers-color-scheme: dark) { .explain-why { border-top-color: rgba(0,0,0,0.15); } }

        .explain-action { display: flex; justify-content: flex-end; margin-top: 16px; }

        .btn-write {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            background: var(--blue);
            color: #fff;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-write:hover { background: #1270c4; }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .step-info { font-family: var(--mono); font-size: 11px; color: var(--ink-light); }

        .controls-right { display: flex; gap: 8px; }

        .btn {
            padding: 10px 20px;
            border: 1.5px solid var(--line);
            border-radius: 6px;
            background: var(--paper);
            color: var(--ink);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { border-color: var(--blue); color: var(--blue); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn.primary { background: var(--green); color: #fff; border-color: var(--green); }
        .btn.primary:hover { background: #4a8015; }
        .btn.primary:disabled { background: var(--ink-light); border-color: var(--ink-light); }

        .score-bar {
            display: none;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            padding: 12px 16px;
            background: var(--highlight);
            border-radius: 6px;
            font-size: 13px;
        }

        .score-bar.show { display: flex; }

        .score-bar .score {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 700;
            color: var(--green);
        }

        .topic-label {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
            background: var(--purple);
            color: #fff;
            margin-left: 6px;
            letter-spacing: 0.04em;
        }

        @media (max-width: 600px) {
            .paper-lines { padding-left: 48px; }
            .paper-lines::before { left: 38px; }
            .answer-line { font-size: 18px; line-height: 32px; min-height: 32px; }
            .mark-tick { left: -28px; font-size: 14px; }
            .question-box .q-text { font-size: 14px; padding-right: 50px; }
            .q-btn { font-size: 9px; padding: 4px 8px; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="question-nav">
        <label>Question:</label>
        <div id="qButtons"></div>
    </div>

    <div class="question-box" id="questionBox">
        <div class="marks" id="marksLabel"></div>
        <div class="source" id="sourceLabel"></div>
        <div class="q-text" id="questionText"></div>
    </div>

    <div class="workspace">
        <div class="paper-lines" id="paperLines"></div>
    </div>

    <div class="score-bar" id="scoreBar">
        <span class="score" id="scoreText"></span>
        <span>All marks secured. This is what a full-marks answer looks like.</span>
    </div>

    <div class="controls">
        <div class="step-info" id="stepInfo"></div>
        <div class="controls-right">
            <button class="btn" id="btnReset" onclick="resetQuestion()">Reset</button>
            <button class="btn primary" id="btnNext" onclick="showNextStep()">Next Step</button>
        </div>
    </div>
</div>

<div class="explain-overlay" id="explainOverlay">
    <div class="explain-bubble">
        <div class="explain-step-num" id="explainStepNum"></div>
        <div class="explain-title" id="explainTitle"></div>
        <div class="explain-body" id="explainBody"></div>
        <div class="explain-why" id="explainWhy"></div>
        <div class="explain-action">
            <button class="btn-write" onclick="writeStep()">Write it &rarr;</button>
        </div>
    </div>
</div>

<script>
var questions = [

    /* ===== TOPIC 1: KEY CONCEPTS ===== */

    {
        id: "ram",
        label: "Relative Atomic Mass",
        source: "Topic 1 \u2014 Key Concepts \u00b7 Isotopes & RAM",
        marks: 3,
        text: "Chlorine exists as two isotopes: \u00b3\u2075Cl (75.5%) and \u00b3\u2077Cl (24.5%).<br>Calculate the relative atomic mass of chlorine.<br><em>Give your answer to 1 decimal place.</em>",
        steps: [
            {
                title: "Write the RAM formula",
                body: "Relative atomic mass is the <strong>weighted average</strong> of the isotope masses. Write the formula: sum of (mass \u00d7 abundance) \u00f7 total abundance.",
                why: "Starting with the formula shows the examiner you know the method, not just the answer. This earns a method mark even if arithmetic goes wrong.",
                lines: [{ text: "RAM = \u03a3(mass \u00d7 abundance) \u00f7 100", type: "formula", tick: true }],
                marks: 1
            },
            {
                title: "Substitute the values",
                body: "Plug in both isotopes: <strong>(35 \u00d7 75.5) + (37 \u00d7 24.5)</strong>. Keep the calculation on one line so the examiner can follow it.",
                why: "Substitution mark \u2014 even if you make an arithmetic slip, this line shows you used the right values.",
                lines: [
                    { text: "RAM = (35 \u00d7 75.5) + (37 \u00d7 24.5)", type: "substitution", tick: true },
                    { text: "         100", type: "annotation" }
                ],
                marks: 1
            },
            {
                title: "Calculate and round",
                body: "35 \u00d7 75.5 = 2642.5 and 37 \u00d7 24.5 = 906.5. Total = 3549. Divide by 100 = <strong>35.5</strong>.",
                why: "The answer 35.5 matches the periodic table value for Cl \u2014 a good sanity check. Always verify your RAM answer looks reasonable compared to the mass numbers.",
                lines: [
                    { text: "= (2642.5 + 906.5) \u00f7 100", type: "substitution" },
                    { text: "= 3549 \u00f7 100", type: "substitution" },
                    { text: "RAM = 35.5", type: "underline-answer", tick: true }
                ],
                marks: 1
            }
        ]
    },

    {
        id: "electron-config",
        label: "Electron Config & Ions",
        source: "Topic 1 \u2014 Key Concepts \u00b7 Electron Configuration & Ionic Bonding",
        marks: 4,
        text: "Sodium has atomic number 11.<br>(a) Write the electron configuration of a sodium atom. (1 mark)<br>(b) Explain, in terms of electron transfer, how sodium and chlorine form an ionic compound. (3 marks)",
        steps: [
            {
                title: "Part (a): Write the electron configuration",
                body: "Sodium has 11 electrons. Fill the shells: <strong>2, 8, 1</strong>. The shells hold 2, 8, 8, ... electrons. Write it clearly.",
                why: "One mark for the correct configuration. The key pattern: 2 in the first shell, up to 8 in the second and third.",
                lines: [{ text: "(a)  Na: 2, 8, 1", type: "underline-answer", tick: true }],
                marks: 1
            },
            {
                title: "Part (b): State what sodium does",
                body: "Sodium <strong>loses</strong> its one outer electron. Say this explicitly: \"Sodium loses one electron from its outer shell.\" This gives it a full outer shell (2, 8) and a <strong>positive charge: Na\u207a</strong>.",
                why: "The examiner needs three things for 3 marks: what each atom does, why it does it, and what the resulting charges are. Start with sodium.",
                lines: [
                    { text: "(b) Sodium loses 1 electron from its outer shell", type: "formula", tick: true },
                    { text: "    forming a Na\u207a ion (electron config: 2, 8)", type: "substitution" }
                ],
                marks: 1
            },
            {
                title: "State what chlorine does",
                body: "Chlorine <strong>gains</strong> one electron into its outer shell. This gives it a full outer shell (2, 8, 8) and a <strong>negative charge: Cl\u207b</strong>.",
                why: "Symmetry: you've said what Na does, now say what Cl does. The electron sodium lost is the one chlorine gains.",
                lines: [
                    { text: "Chlorine gains 1 electron into its outer shell", type: "formula", tick: true },
                    { text: "    forming a Cl\u207b ion (electron config: 2, 8, 8)", type: "substitution" }
                ],
                marks: 1
            },
            {
                title: "Explain the bond",
                body: "The oppositely charged ions (<strong>Na\u207a and Cl\u207b</strong>) are held together by <strong>strong electrostatic attraction</strong>. This is ionic bonding. Both ions now have full outer shells (stable noble gas configuration).",
                why: "The phrase 'electrostatic attraction between oppositely charged ions' is the textbook definition. Examiners look for these exact keywords.",
                lines: [
                    { text: "Na\u207a and Cl\u207b attract by strong electrostatic forces", type: "result", tick: true },
                    { text: "Both ions have full outer shells (stable)", type: "result" }
                ],
                marks: 1
            }
        ]
    },

    {
        id: "empirical",
        label: "Empirical Formula",
        source: "Topic 1 \u2014 Key Concepts \u00b7 Empirical Formulae",
        marks: 3,
        text: "A compound contains 40.0% carbon, 6.7% hydrogen, and 53.3% oxygen by mass.<br>Determine the empirical formula of the compound.<br><em>(A\u1d63: C = 12, H = 1, O = 16)</em>",
        steps: [
            {
                title: "Divide each percentage by the atomic mass",
                body: "Convert percentages to moles by dividing each by its A\u1d63: <strong>C: 40.0 \u00f7 12</strong>, <strong>H: 6.7 \u00f7 1</strong>, <strong>O: 53.3 \u00f7 16</strong>. This gives you the molar ratio.",
                why: "This is THE method for empirical formula. Percentages tell you mass ratio, but you need mole ratio. Dividing by Ar converts mass to moles.",
                lines: [
                    { text: "C:  40.0 \u00f7 12 = 3.33", type: "substitution", tick: true },
                    { text: "H:  6.7 \u00f7 1 = 6.7", type: "substitution" },
                    { text: "O:  53.3 \u00f7 16 = 3.33", type: "substitution" }
                ],
                marks: 1
            },
            {
                title: "Divide by the smallest number",
                body: "The smallest value is 3.33. Divide all values by 3.33 to get the <strong>simplest whole number ratio</strong>.",
                why: "This step reduces to the simplest ratio. If you get values like 1.5, multiply everything by 2. If 1.33, multiply by 3.",
                lines: [
                    { text: "C:  3.33 \u00f7 3.33 = 1", type: "substitution", tick: true },
                    { text: "H:  6.7 \u00f7 3.33 = 2", type: "substitution" },
                    { text: "O:  3.33 \u00f7 3.33 = 1", type: "substitution" }
                ],
                marks: 1
            },
            {
                title: "Write the empirical formula",
                body: "The ratio is C:H:O = <strong>1:2:1</strong>, so the empirical formula is <strong>CH\u2082O</strong>.",
                why: "Always write the formula clearly and underline it. CH\u2082O is the simplest ratio \u2014 the molecular formula could be a multiple of this (e.g. C\u2082H\u2084O\u2082 = glucose).",
                lines: [
                    { text: "Ratio  C : H : O  =  1 : 2 : 1", type: "result" },
                    { text: "Empirical formula = CH\u2082O", type: "underline-answer", tick: true }
                ],
                marks: 1
            }
        ]
    },

    {
        id: "reacting-mass",
        label: "Reacting Masses",
        source: "Topic 1 \u2014 Key Concepts \u00b7 Calculations Involving Masses",
        marks: 4,
        text: "Magnesium reacts with hydrochloric acid:<br><br>Mg + 2HCl \u2192 MgCl\u2082 + H\u2082<br><br>Calculate the mass of magnesium chloride produced when 4.8 g of magnesium reacts completely.<br><em>(A\u1d63: Mg = 24, Cl = 35.5)</em>",
        steps: [
            {
                title: "Calculate M\u1d63 of the substances you need",
                body: "You need M\u1d63 of Mg (reactant) and MgCl\u2082 (product). <strong>Mg = 24</strong>. <strong>MgCl\u2082 = 24 + (2 \u00d7 35.5) = 95</strong>.",
                why: "Always start by calculating the Mr values you'll need. Write them clearly \u2014 this is a method mark.",
                lines: [
                    { text: "M\u1d63(Mg) = 24", type: "formula" },
                    { text: "M\u1d63(MgCl\u2082) = 24 + (2 \u00d7 35.5) = 95", type: "formula", tick: true }
                ],
                marks: 1
            },
            {
                title: "Calculate moles of magnesium",
                body: "Use <strong>moles = mass \u00f7 M\u1d63</strong>. Moles of Mg = 4.8 \u00f7 24 = <strong>0.2 mol</strong>.",
                why: "Converting to moles is the bridge between mass and the equation ratio. This is the key step in any reacting mass calculation.",
                lines: [
                    { text: "moles = mass \u00f7 M\u1d63", type: "formula" },
                    { text: "moles of Mg = 4.8 \u00f7 24 = 0.2 mol", type: "substitution", tick: true }
                ],
                marks: 1
            },
            {
                title: "Use the equation ratio",
                body: "From the equation: <strong>1 Mg \u2192 1 MgCl\u2082</strong> (1:1 ratio). So 0.2 mol Mg produces <strong>0.2 mol MgCl\u2082</strong>.",
                why: "The balanced equation tells you the mole ratio. Always check the coefficients \u2014 here it's 1:1, but it won't always be.",
                lines: [
                    { text: "ratio Mg : MgCl\u2082 = 1 : 1", type: "annotation" },
                    { text: "so moles of MgCl\u2082 = 0.2 mol", type: "result", tick: true }
                ],
                marks: 1
            },
            {
                title: "Convert back to mass",
                body: "Use <strong>mass = moles \u00d7 M\u1d63</strong>. Mass of MgCl\u2082 = 0.2 \u00d7 95 = <strong>19 g</strong>.",
                why: "The last step converts moles back to grams. Check: 19 g product from 4.8 g reactant makes sense \u2014 the product is heavier because it includes the chlorine atoms.",
                lines: [
                    { text: "mass = moles \u00d7 M\u1d63", type: "formula" },
                    { text: "mass of MgCl\u2082 = 0.2 \u00d7 95", type: "substitution" },
                    { text: "= 19 g", type: "underline-answer", tick: true }
                ],
                marks: 1
            }
        ]
    },

    {
        id: "bonding-properties",
        label: "Bonding & Properties",
        source: "Topic 1 \u2014 Key Concepts \u00b7 Covalent & Metallic Bonding",
        marks: 6,
        text: "Diamond and copper are both solids with high melting points.<br>Explain, in terms of structure and bonding, why:<br>(a) diamond does not conduct electricity but copper does (3 marks)<br>(b) both substances have high melting points (3 marks)",
        steps: [
            {
                title: "Part (a): Describe diamond's structure",
                body: "Diamond is a <strong>giant covalent structure</strong>. Each carbon atom is bonded to four others by <strong>strong covalent bonds</strong>. There are <strong>no free electrons or ions</strong> to carry charge.",
                why: "The key phrase is 'no free electrons' or 'no delocalised electrons'. This directly answers WHY it can't conduct. Structure first, then link to the property.",
                lines: [
                    { text: "(a) Diamond: giant covalent structure", type: "formula", tick: true },
                    { text: "All outer electrons used in covalent bonds", type: "substitution" },
                    { text: "No free/delocalised electrons \u2192 cannot conduct", type: "result", tick: true }
                ],
                marks: 2
            },
            {
                title: "Part (a): Explain copper's conductivity",
                body: "Copper has <strong>metallic bonding</strong>: positive metal ions in a regular lattice surrounded by a <strong>sea of delocalised electrons</strong>. These electrons are free to move and <strong>carry charge</strong>.",
                why: "'Delocalised electrons that are free to move' is the mark-winning phrase. Link it explicitly to carrying charge/current.",
                lines: [
                    { text: "Copper: metallic bonding \u2014 lattice of Cu\u207a ions", type: "formula" },
                    { text: "Sea of delocalised electrons, free to move", type: "result", tick: true },
                    { text: "These carry electrical charge \u2192 conducts", type: "result" }
                ],
                marks: 1
            },
            {
                title: "Part (b): Why diamond has a high melting point",
                body: "Diamond has <strong>many strong covalent bonds</strong> throughout the giant structure. It takes a <strong>large amount of energy</strong> to break these bonds, so the melting point is high.",
                why: "Two things needed: identify the bonds as strong + say lots of energy needed to break them. Don't just say 'strong bonds' \u2014 say 'lots of strong bonds that need a lot of energy to break'.",
                lines: [
                    { text: "(b) Diamond: many strong covalent bonds", type: "formula", tick: true },
                    { text: "throughout the structure", type: "substitution" },
                    { text: "Large energy needed to overcome them \u2192 high m.p.", type: "result" }
                ],
                marks: 1
            },
            {
                title: "Part (b): Why copper has a high melting point",
                body: "In copper, there is <strong>strong electrostatic attraction</strong> between the positive metal ions and the delocalised electrons. A lot of energy is needed to overcome these forces.",
                why: "Same structure as the diamond answer: name the type of attraction, then link to energy needed. The phrase 'strong electrostatic attraction between metal ions and delocalised electrons' hits all the mark scheme points.",
                lines: [
                    { text: "Copper: strong electrostatic attraction between", type: "formula", tick: true },
                    { text: "positive ions and delocalised electrons", type: "substitution" },
                    { text: "Large energy needed to overcome \u2192 high m.p.", type: "result", tick: true }
                ],
                marks: 2
            }
        ]
    },

    /* ===== TOPIC 2: STATES OF MATTER ===== */

    {
        id: "chromatography",
        label: "Chromatography & Rf",

var currentQ = 0;
var currentStep = -1;
var pendingStep = null;

function init() {
    var btns = document.getElementById('qButtons');
    btns.innerHTML = '';
    for (var i = 0; i < questions.length; i++) {
        var b = document.createElement('button');
        b.className = 'q-btn' + (i === 0 ? ' active' : '');
        b.textContent = (i + 1) + '. ' + questions[i].label;
        b.setAttribute('data-idx', i);
        b.onclick = function() { selectQuestion(parseInt(this.getAttribute('data-idx'))); };
        btns.appendChild(b);
    }
    selectQuestion(0);
}

function selectQuestion(idx) {
    currentQ = idx;
    currentStep = -1;
    pendingStep = null;

    var q = questions[idx];

    var btns = document.querySelectorAll('.q-btn');
    for (var i = 0; i < btns.length; i++) {
        btns[i].className = 'q-btn' + (i === idx ? ' active' : '');
    }

    document.getElementById('marksLabel').textContent = q.marks + ' marks';
    document.getElementById('sourceLabel').textContent = q.source;
    document.getElementById('questionText').innerHTML = q.text;

    var paper = document.getElementById('paperLines');
    paper.innerHTML = '';

    var lineIdx = 0;
    for (var s = 0; s < q.steps.length; s++) {
        for (var l = 0; l < q.steps[s].lines.length; l++) {
            var div = document.createElement('div');
            div.className = 'answer-line ' + q.steps[s].lines[l].type;
            div.id = 'line-' + lineIdx;

            if (q.steps[s].lines[l].tick) {
                var tick = document.createElement('span');
                tick.className = 'mark-tick';
                tick.textContent = '\u2713';
                div.appendChild(tick);
            }

            var textNode = document.createTextNode(q.steps[s].lines[l].text);
            div.appendChild(textNode);
            paper.appendChild(div);
            lineIdx++;
        }
    }

    document.getElementById('scoreBar').className = 'score-bar';
    updateControls();
}

function showNextStep() {
    var q = questions[currentQ];
    var nextIdx = currentStep + 1;
    if (nextIdx >= q.steps.length) return;

    pendingStep = nextIdx;
    var step = q.steps[nextIdx];

    document.getElementById('explainStepNum').textContent = 'Step ' + (nextIdx + 1) + ' of ' + q.steps.length;
    document.getElementById('explainTitle').textContent = step.title;
    document.getElementById('explainBody').innerHTML = step.body;
    document.getElementById('explainWhy').textContent = step.why;
    document.getElementById('explainOverlay').className = 'explain-overlay show';
}

function writeStep() {
    document.getElementById('explainOverlay').className = 'explain-overlay';

    if (pendingStep === null) return;

    currentStep = pendingStep;
    pendingStep = null;

    var q = questions[currentQ];
    var lineIdx = 0;
    for (var s = 0; s <= currentStep; s++) {
        for (var l = 0; l < q.steps[s].lines.length; l++) {
            if (s === currentStep) {
                var el = document.getElementById('line-' + lineIdx);
                if (el) {
                    (function(element, delay) {
                        setTimeout(function() {
                            element.classList.add('visible');
                        }, delay);
                    })(el, l * 200);
                }
            }
            lineIdx++;
        }
    }

    setTimeout(function() {
        var lastLine = document.getElementById('line-' + (lineIdx - 1));
        if (lastLine) {
            lastLine.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }, 300);

    updateControls();
}

function resetQuestion() {
    selectQuestion(currentQ);
}

function updateControls() {
    var q = questions[currentQ];
    var totalSteps = q.steps.length;
    var completed = currentStep + 1;

    var earnedMarks = 0;
    for (var s = 0; s <= currentStep; s++) {
        if (s < q.steps.length) earnedMarks += q.steps[s].marks;
    }

    if (currentStep < 0) {
        document.getElementById('stepInfo').textContent = 'Ready \u2014 click Next Step to begin';
    } else {
        document.getElementById('stepInfo').textContent =
            'Step ' + completed + '/' + totalSteps + '  \u00b7  ' + earnedMarks + '/' + q.marks + ' marks';
    }

    document.getElementById('btnNext').disabled = (completed >= totalSteps);
    document.getElementById('btnReset').disabled = (currentStep < 0);

    if (completed >= totalSteps) {
        document.getElementById('scoreBar').className = 'score-bar show';
        document.getElementById('scoreText').textContent = q.marks + '/' + q.marks;
    }
}

document.getElementById('explainOverlay').addEventListener('click', function(e) {
    if (e.target === this) {
        this.className = 'explain-overlay';
        pendingStep = null;
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
        var overlay = document.getElementById('explainOverlay');
        if (overlay.classList.contains('show')) {
            e.preventDefault();
            writeStep();
        } else {
            var q = questions[currentQ];
            if (currentStep + 1 < q.steps.length) {
                e.preventDefault();
                showNextStep();
            }
        }
    }
    if (e.key === 'Escape') {
        document.getElementById('explainOverlay').className = 'explain-overlay';
        pendingStep = null;
    }
});

init();
</script>
