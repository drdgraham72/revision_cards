// ── render
const topicFilterEl = document.getElementById('topic-filters');
const typeFilterEl  = document.getElementById('type-filters');
const gridEl        = document.getElementById('grid');
const counterEl     = document.getElementById('counter');
let activeTopic = "All";
let activeType  = "All";

const topicBadgeClass = {
  "Causes of WWI":"badge-Causes",
  "Stalemate":"badge-Stalemate",
  "End of WWI":"badge-End",
  "Weimar & Nazi Germany":"badge-Weimar"
};

TOPICS.forEach(t => {
  const b = document.createElement('button');
  b.className = 'fbtn' + (t === 'All' ? ' active' : '');
  b.textContent = t;
  b.dataset.topic = t;
  b.onclick = () => { activeTopic = t; topicFilterEl.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); };
  topicFilterEl.appendChild(b);
});
TYPES.forEach(t => {
  const b = document.createElement('button');
  b.className = 'fbtn' + (t === 'All' ? ' active' : '');
  b.textContent = t;
  b.dataset.type = t;
  b.onclick = () => { activeType = t; typeFilterEl.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); };
  typeFilterEl.appendChild(b);
});

function render() {
  gridEl.innerHTML = '';
  let filtered = cards;
  if (activeTopic !== 'All') filtered = filtered.filter(c => c.topic === activeTopic);
  if (activeType  !== 'All') filtered = filtered.filter(c => c.type  === activeType);
  counterEl.textContent = filtered.length + ' card' + (filtered.length !== 1 ? 's' : '');
  filtered.forEach(c => {
    const badgeClass = topicBadgeClass[c.topic] || '';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <div>
          <span class="topic-badge ${badgeClass}">${c.topic}</span>
        </div>
        <div style="text-align:right">
          <div class="type-tag">${c.type}</div>
          <div class="date-tag">${c.date}</div>
        </div>
      </div>
      <div class="term">${c.term}</div>
      <div class="mnemonic">&#9670; ${c.mnemonic}</div>
      <div class="summary">${c.summary}</div>
      <div class="back">
        <div class="detail">${c.detail}</div>
        <div class="exam-box">
          <div class="exam-label">Exam angle</div>
          ${c.exam}
        </div>
      </div>
      <div class="tap-hint">tap to reveal detail + exam angle</div>
    `;
    card.onclick = () => { card.classList.toggle('flipped'); card.querySelector('.tap-hint').textContent = card.classList.contains('flipped') ? 'tap to hide' : 'tap to reveal detail + exam angle'; };
    gridEl.appendChild(card);
  });
}
render();
</script>
