/* ══════════════════════════════
   SKELETAL SYSTEM
══════════════════════════════ */
{top:"Skeletal",type:"structure",
 term:"Functions of the Skeleton",
 mnem:"SPMMAS — Support, Protection, Movement, Mineral storage, Attachment of muscles, Shape, blood cell production",
 def:"The skeleton has six key functions: support (holds body upright), protection (flat bones protect organs), movement (bones act as levers), mineral storage (calcium/phosphorus in bones), muscle attachment (tendons connect muscle to bone), blood cell production (red bone marrow produces RBCs).",
 detail:"Support: maintains posture against gravity. Protection: skull protects brain; ribcage protects heart and lungs; pelvis protects reproductive organs. Movement: bones act as levers — muscles pull on bones via tendons to create movement at joints. Mineral storage: calcium strengthens bones and is released when blood calcium drops. Blood cell production (haematopoiesis): occurs in red bone marrow of flat and short bones (sternum, pelvis).",
 sport:"Support — a gymnast's skeleton supports their weight during a handstand. Protection — a rugby player's ribcage protects the heart and lungs during a tackle. Attachment — the quadriceps attach to the femur via tendons to extend the knee when kicking a ball.",
 calc:null,
 exam:"Exam: 'State two functions of the skeleton' — choose two from the list and link to a physical activity example. 6-mark extended question may ask you to explain how the skeleton enables movement — address levers, joints, muscle attachment and the specific sport."
},
{top:"Skeletal",type:"structure",
 term:"Types of Bone",
 mnem:"LFSI — Long (levers/movement), Flat (protection/attachment), Short (fine movement/stability), Irregular (protection — spine/skull base)",
 def:"Four types of bone, each adapted to a specific function: long bones (levers for movement), flat bones (protection and muscle attachment), short bones (fine movement and weight bearing), irregular bones (unique shapes for protection and complex function).",
 detail:"Long bones: femur, humerus, tibia, fibula, radius, ulna — hollow shaft (medullary cavity) filled with yellow marrow (fat), ends (epiphyses) contain red marrow. Act as levers. Flat bones: skull, sternum, scapula, pelvis — broad surfaces for muscle attachment, protect vital organs, contain red marrow. Short bones: carpals, tarsals — weight bearing and fine motor control. Irregular: vertebrae, sacrum — complex shapes for specific roles (spinal protection, support).",
 sport:"Long bones — femur acts as the lever arm during a sprint. Short bones — carpals allow fine wrist movement in a tennis serve. Flat bones — scapula provides attachment for rotator cuff muscles used in a swimming stroke.",
 calc:null,
 exam:"Exam: 'Give one example of a flat bone and state one function' — skull / sternum / scapula / pelvis → protects vital organs OR provides surface for muscle attachment. Must give both the name AND the function for 2 marks."
},
{top:"Skeletal",type:"structure",
 term:"The Axial & Appendicular Skeleton",
 mnem:"AXIAL = central core (skull, ribcage, vertebral column). APPENDICULAR = limbs and girdles attached to axial.",
 def:"The skeleton is divided into two parts: the axial skeleton (central axis — skull, vertebral column, ribcage, sternum) and the appendicular skeleton (limbs and their girdles — pectoral and pelvic girdles, arms and legs).",
 detail:"Axial skeleton: 80 bones forming the central support structure. Protects the brain and spinal cord, supports the head, and provides attachment for the appendicular skeleton. Appendicular skeleton: 126 bones. Pectoral girdle (clavicle + scapula) connects arms to axial. Pelvic girdle (hip bones + sacrum) connects legs to axial. Enables all locomotion — running, throwing, kicking, swimming.",
 sport:"Axial: vertebral column transmits force from legs to upper body in a rowing stroke. Appendicular: pectoral girdle allows arm swing and overhead throwing actions in cricket/basketball.",
 calc:null,
 exam:"Exam: 'Identify which part of the skeleton the femur belongs to' = appendicular skeleton. Less commonly tested but may appear as multiple choice. Know: skull, sternum, ribs, vertebrae = axial. Everything else = appendicular."
},

/* ══════════════════════════════
   JOINTS
══════════════════════════════ */
{top:"Joints",type:"structure",
 term:"Types of Joint",
 mnem:"HINGE = one plane (elbow, knee, ankle). BALL AND SOCKET = multi-directional (hip, shoulder). PIVOT = rotation (atlas/axis in neck). CONDYLOID = two planes (wrist, knuckles).",
 def:"Synovial joints are classified by the shape of the articulating surfaces and the range of movement they allow. The four main types are hinge, ball and socket, pivot, and condyloid joints.",
 detail:"Hinge joint: permits flexion and extension only — uniaxial. Examples: elbow, knee, ankle, interphalangeal joints. Ball and socket: rounded head fits into cup-shaped socket — multiaxial, allows flexion/extension, abduction/adduction, rotation, circumduction. Examples: hip (femur into acetabulum), shoulder (humerus into glenoid fossa). Pivot joint: one bone rotates around another — only rotation. Examples: atlas/axis (head rotation), radioulnar joint (pronation/supination). Condyloid: oval head in elliptical cavity — biaxial. Examples: wrist (radius/ulna and carpals), metacarpophalangeal joints.",
 sport:"Hinge — the knee extends during a football kick (femur/tibia). Ball and socket — the shoulder allows circumduction when bowling in cricket. Pivot — the radioulnar joint allows forearm rotation in a tennis backhand.",
 calc:null,
 exam:"Exam: 'Identify the type of joint at the hip' = ball and socket. 'State two movements possible at a ball and socket joint' = any two from: flexion, extension, abduction, adduction, rotation, circumduction. Hinge = flexion and extension ONLY — common exam trap."
},
{top:"Joints",type:"structure",
 term:"Synovial Joint Structure",
 mnem:"SLABCJ — Synovial membrane, Ligaments, Articular cartilage, Bursa, Capsule, Joint cavity (filled with synovial fluid)",
 def:"A synovial joint contains several structures that enable smooth movement while maintaining stability: synovial membrane, synovial fluid, articular cartilage, joint capsule, ligaments, and bursae.",
 detail:"Synovial membrane: lines the joint capsule, produces synovial fluid. Synovial fluid: lubricates the joint, reduces friction, nourishes cartilage. Articular (hyaline) cartilage: covers the ends of bones, absorbs shock, reduces friction, smooth surface for movement. Joint capsule: fibrous sleeve enclosing the joint, maintains stability. Ligaments: fibrous connective tissue joining bone to bone, prevents excessive movement, stabilises joint. Bursae: fluid-filled sacs between tendons/bones, cushion and reduce friction. Tendons: join muscle to bone (not technically inside joint but essential for movement).",
 sport:"Articular cartilage absorbs impact in the knee joint during a basketball jump landing. Ligaments stabilise the ankle joint when a sprinter plants their foot. Synovial fluid lubricates the shoulder during a cricket bowling action.",
 calc:null,
 exam:"Exam: 'State the function of articular cartilage' = reduces friction between bones / absorbs shock / provides smooth surface for movement. 'State the function of a ligament' = joins bone to bone / stabilises the joint / prevents excessive movement. Do not confuse ligament (bone–bone) with tendon (muscle–bone)."
},
{top:"Joints",type:"process",
 term:"Joint Actions / Types of Movement",
 mnem:"FREED CAP — Flexion, Extension, Rotation, Extension, Elevation/Depression, Dorsi/Plantar flexion, Circumduction, Abduction, adduction, Pronation/supination",
 def:"Joints allow specific types of movement depending on their structure. Key movements: flexion (decrease in angle), extension (increase in angle), abduction (away from midline), adduction (towards midline), rotation, circumduction, plantar flexion (pointing toes), dorsiflexion (pulling toes up).",
 detail:"Flexion: bending — decreasing angle at joint. Extension: straightening — increasing angle. Hyperextension: beyond normal anatomical position (e.g. neck tilt). Abduction: limb moves away from body midline (raising arm sideways). Adduction: limb moves towards body midline. Rotation: bone turns about its long axis. Circumduction: combination of flex/extend/abduct/adduct — circular motion (shoulder/hip). Plantar flexion: foot extends (standing on tiptoe). Dorsiflexion: foot flexes (pulling toes up). Pronation: palm turns down. Supination: palm turns up.",
 sport:"Flexion at the knee during the recovery phase of a sprint. Extension at the elbow when releasing a shot put. Plantar flexion at the ankle when a gymnast points their toes. Abduction at the shoulder during a breaststroke arm action.",
 calc:null,
 exam:"Exam: 'State the joint action occurring at the knee during the upward phase of a squat' = extension. 'What joint action occurs at the ankle when a sprinter pushes off the blocks?' = plantar flexion. Always name the joint AND the movement AND the direction (e.g. from flexion to extension)."
},
{top:"Joints",type:"process",
 term:"Antagonistic Muscle Pairs",
 mnem:"AGONIST CONTRACTS, ANTAGONIST RELAXES — muscles can only pull (contract), never push. Pairs work in opposition to move joints in both directions.",
 def:"Muscles work in antagonistic pairs — when one contracts (agonist), the other relaxes (antagonist). Muscles can only generate force by shortening; they cannot push. Therefore two muscles are needed to move a joint in opposite directions.",
 detail:"Agonist (prime mover): the muscle primarily responsible for a joint action — it contracts concentrically to produce movement. Antagonist: the muscle that opposes the agonist — relaxes and lengthens as the agonist contracts. Fixator: stabilises nearby joints so energy is directed to the intended movement. Key pairs: elbow — biceps/triceps; knee — quadriceps/hamstrings; ankle — gastrocnemius/tibialis anterior; shoulder — deltoid/latissimus dorsi. In eccentric contraction: muscle produces force while lengthening (controlling movement against gravity).",
 sport:"Biceps curl: biceps = agonist (concentric contraction) → elbow flexion; triceps = antagonist (relaxes). On the way down: triceps = agonist (eccentric) controls lowering. Kicking a ball: quadriceps = agonist for knee extension; hamstrings = antagonist.",
 calc:null,
 exam:"Exam: 'State the agonist during knee extension in a football kick' = quadriceps. 'State the antagonist during the same movement' = hamstrings. 'Explain the role of antagonistic muscle pairs' — agonist contracts (shortens), antagonist relaxes (lengthens), allowing movement at the joint in one direction; roles reverse for opposite movement."
},

/* ══════════════════════════════
   CARDIOVASCULAR SYSTEM
══════════════════════════════ */
{top:"Cardiovascular",type:"process",
 term:"The Cardiac Cycle",
 mnem:"DADS — Diastole (Atria fill), Atrial systole (Atria contract), Diastole (Ventricles fill), Systole (Ventricles contract and blood ejected)",
 def:"The cardiac cycle is the sequence of events in one complete heartbeat. It involves alternating relaxation (diastole) and contraction (systole) of the atria and ventricles.",
 detail:"1. Atrial diastole + ventricular diastole: both chambers relax — blood flows from vena cava (right) and pulmonary veins (left) into atria, then through AV valves into relaxed ventricles. 2. Atrial systole: atria contract, pushing remaining blood into ventricles. AV valves open. 3. Ventricular systole: ventricles contract — pressure closes AV valves (prevents backflow), opens semilunar valves. Blood ejected: right ventricle → pulmonary artery → lungs; left ventricle → aorta → body. 4. Diastole: ventricles relax, semilunar valves close. Cycle repeats. Electrical: SA node (pacemaker) initiates impulse → AV node → Bundle of His → Purkinje fibres.",
 sport:"During a 400m sprint, heart rate increases from ~70 bpm to ~180+ bpm. Stroke volume also increases (more blood fills ventricles due to increased venous return from working muscles) → cardiac output rises dramatically to deliver oxygen.",
 calc:"Cardiac output (Q) = Stroke Volume (SV) × Heart Rate (HR)\nQ = SV × HR\nUnits: litres per minute (L/min)\n\nExample: SV = 70ml, HR = 70bpm\nQ = 70 × 70 = 4900ml/min = ~5 L/min at rest\n\nDuring exercise: SV=120ml, HR=180bpm\nQ = 120 × 180 = 21,600ml/min = 21.6 L/min",
 exam:"Exam: 'Calculate cardiac output given SV and HR' — multiply. Watch units: SV in ml → Q in ml/min. Convert to L/min by dividing by 1000. 'State the correct order of the cardiac cycle' — diastole → atrial systole → ventricular systole → diastole. Know blood pathway: vena cava → right atrium → right ventricle → pulmonary artery → lungs → pulmonary vein → left atrium → left ventricle → aorta."
},
{top:"Cardiovascular",type:"structure",
 term:"Blood Vessels: Arteries, Veins, Capillaries",
 mnem:"ARTERIES Away from heart (thick walls, elastic, high pressure). VEINS to heart (thin walls, valves, low pressure). CAPILLARIES = exchange vessels (one cell thick).",
 def:"Three types of blood vessel each adapted to their function: arteries carry blood away from the heart at high pressure; veins carry blood back to the heart at low pressure; capillaries are the site of exchange between blood and tissues.",
 detail:"Arteries: thick muscular and elastic walls (withstand high pressure from ventricular contraction), small lumen, no valves. Carry oxygenated blood (except pulmonary artery). Veins: thinner walls (blood at low pressure), large lumen, valves (prevent backflow — blood relies on muscle contractions and breathing to return). Carry deoxygenated blood (except pulmonary vein). Capillaries: one cell thick (short diffusion pathway), large total surface area, allow exchange of O₂, CO₂, glucose, waste. Named vessels: aorta (left ventricle → body), pulmonary artery (right ventricle → lungs), vena cava (body → right atrium), pulmonary vein (lungs → left atrium).",
 sport:"During exercise, capillaries in working muscles dilate (vasodilation) → more blood delivered → more O₂ for aerobic respiration. Capillary network in muscles is extensive — crucial for sustained performance in endurance events like marathon running.",
 calc:null,
 exam:"Exam: 'State one structural difference between an artery and a vein' = artery has thicker, more muscular/elastic walls / smaller lumen / no valves. 'Explain why veins have valves' = blood travels at low pressure; valves prevent backflow, ensuring blood flows one-way towards the heart."
},
{top:"Cardiovascular",type:"process",
 term:"Blood Redistribution During Exercise",
 mnem:"VASO — Vasodilation to working muscles and skin; Vasoconstriction of digestive organs, kidneys, liver; pre-capillary sphincters control flow",
 def:"During exercise, blood is redistributed away from organs not essential to exercise (gut, liver, kidneys) and towards working muscles, the heart, and the skin. This is achieved by vasoconstriction and vasodilation controlled by the vasomotor centre in the medulla.",
 detail:"At rest: ~15–20% of cardiac output to muscles. During maximal exercise: ~80–85% to muscles. Mechanisms: (1) Chemoreceptors detect increased CO₂, decreased O₂, decreased pH in blood → signal vasomotor centre. (2) Vasomotor centre sends sympathetic nerve impulses. (3) Pre-capillary sphincters and smooth muscle in vessel walls respond: working muscle arterioles → vasodilate (wider, more blood); gut/liver/kidney arterioles → vasoconstrict (narrower, less blood). (4) Skin vasodilates for thermoregulation (heat removal). (5) Brain maintains constant blood flow at all intensities (priority).",
 sport:"A footballer sprinting needs blood redirected to leg muscles. Blood is shunted away from the digestive system — this is why eating a large meal before sport causes discomfort (blood needed for digestion is diverted away).",
 calc:null,
 exam:"Exam: 'Explain how blood is redistributed during exercise' — must include: vasodilation of arterioles supplying working muscles; vasoconstriction of arterioles supplying non-essential organs (gut/kidneys); pre-capillary sphincters control; vasomotor centre in medulla. Name the process, give the direction, name the organs affected."
},

/* ══════════════════════════════
   RESPIRATORY SYSTEM
══════════════════════════════ */
{top:"Respiratory",type:"structure",
 term:"Pathway of Air & Mechanics of Breathing",
 mnem:"MOUTH → TRACHEA → BRONCHI → BRONCHIOLES → ALVEOLI. Inhalation: diaphragm contracts DOWN, intercostals contract → ribs UP and OUT → volume increases → pressure drops → air flows in.",
 def:"Air enters through mouth/nose, travels to the alveoli via the trachea, bronchi, and bronchioles. Breathing involves changes in thoracic volume and pressure controlled by the diaphragm and intercostal muscles.",
 detail:"Inhalation (active): external intercostal muscles contract → ribs move up and out; diaphragm contracts → flattens downward; thoracic volume increases → air pressure decreases below atmospheric pressure → air flows into lungs. Exhalation (passive at rest): internal intercostals and diaphragm relax; elastic recoil of lungs; thoracic volume decreases → pressure increases above atmospheric → air expelled. During exercise: forced exhalation uses internal intercostals and abdominals (active). Rate and depth increase to meet O₂ demand. Alveoli: ~600 million in human lungs, massive surface area (~70m²).",

 calc:"Minute ventilation = Tidal volume × Breathing rate\nMV = TV × BR\n\nExample: TV = 0.5L, BR = 15/min → MV = 7.5 L/min at rest\nExercise: TV = 2.5L, BR = 40/min → MV = 100 L/min",
 exam:"Exam: 'Explain what happens to the diaphragm during inhalation' = diaphragm contracts and moves downward / flattens → increases volume of thoracic cavity → decreases air pressure → air flows in. Always chain the mechanism: muscle action → volume change → pressure change → air movement."
},
{top:"Respiratory",type:"process",
 term:"Gaseous Exchange",
 mnem:"HAEMOGLOBIN + O₂ → OXYhaemoglobin (at alveoli). At muscles: O₂ released, CO₂ picked up. Both exchanges by DIFFUSION — high to low concentration.",
 def:"Gaseous exchange is the movement of oxygen from the alveoli into the blood and carbon dioxide from the blood into the alveoli, by diffusion. A second exchange occurs at the muscle tissues.",
 detail:"At alveoli: O₂ concentration in alveoli > O₂ in capillary blood → O₂ diffuses into blood → binds to haemoglobin to form oxyhaemoglobin. CO₂ concentration in blood > CO₂ in alveoli → CO₂ diffuses out. Features facilitating exchange: (1) thin walls (one cell thick) — short diffusion pathway; (2) moist surface — gases dissolve; (3) large surface area — millions of alveoli; (4) rich capillary network — maintains concentration gradient; (5) constant ventilation and blood flow — maintains gradient. At muscles: oxyhaemoglobin releases O₂ to cells (high CO₂ in cells). CO₂ diffuses from cells into blood.",

const tfEl=document.getElementById('tf');
const ttEl=document.getElementById('tt');
const gridEl=document.getElementById('grid');
const ctrEl=document.getElementById('ctr');
let aTop="All", aType="All";

TOPICS.forEach(t=>{
  const b=document.createElement('button');
  b.className='fb'+(t==='All'?' on':'');
  b.textContent=t; b.dataset.f=t;
  b.onclick=()=>{aTop=t;tfEl.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();};
  tfEl.appendChild(b);
});
TYPES.forEach(t=>{
  const b=document.createElement('button');
  b.className='fb'+(t==='All'?' on':'');
  b.textContent=t; b.dataset.t=t;
  b.onclick=()=>{aType=t;ttEl.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();};
  ttEl.appendChild(b);
});

function badgeClass(top){
  return 'b'+top.replace(/[^a-zA-Z]/g,'');
}

function render(){
  gridEl.innerHTML='';
  let f=C;
  if(aTop!=='All') f=f.filter(c=>c.top===aTop);
  if(aType!=='All') f=f.filter(c=>c.type===aType);
  ctrEl.textContent=f.length+' card'+(f.length!==1?'s':'');
  f.forEach(c=>{
    const el=document.createElement('div');
    el.className='card';
    const hasCalc=!!c.calc;
    const bc=badgeClass(c.top);
    el.innerHTML=`
      <div class="ctop">
        <div class="badges">
          <span class="badge ${bc}">${c.top}</span>
          <span class="badge" style="background:var(--bg2);color:var(--t3)">${c.type}</span>
          ${hasCalc?'<span class="badge" style="background:#E1F5EE;color:#0F6E56">∑ calc</span>':''}
        </div>
      </div>
      <div class="cterm">${c.term}</div>
      <div class="cmnem">◆ ${c.mnem}</div>
      <div class="cdef">${c.def}</div>
      <div class="back">
        <div class="detail">${c.detail}</div>
        <div class="sport-box"><div class="sport-label">Sporting example</div>${c.sport}</div>
        ${hasCalc?`<div class="calc-box"><div class="calc-label">Calculation</div>${c.calc.replace(/\n/g,'<br>')}</div>`:''}
        <div class="exam-box"><div class="exam-label">Exam angle</div>${c.exam}</div>
      </div>
      <div class="hint">tap to reveal</div>
    `;
    el.onclick=()=>{el.classList.toggle('flipped');el.querySelector('.hint').textContent=el.classList.contains('flipped')?'tap to hide':'tap to reveal';};
    gridEl.appendChild(el);
  });
}
render();
</script>

<script>
(function() {
    var btn = document.querySelector('.yt-link');
    if (!btn) return;
    var defaultHref = btn.href;
    var sections = document.querySelectorAll('[data-yt]');
    if (sections.length === 0) return;
    var observer = new IntersectionObserver(function(entries) {
        for (var i = 0; i < entries.length; i++) {
            if (entries[i].isIntersecting) {
                var q = entries[i].target.getAttribute('data-yt');
                btn.href = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q);
                var label = entries[i].target.getAttribute('data-yt-label');
                if (label) { var span = btn.querySelector('.yt-label'); if (span) span.textContent = label; }
                var label = entries[i].target.getAttribute('data-yt-label');
                if (label) { var span = btn.querySelector('.yt-label'); if (span) span.textContent = label; }
                var label = entries[i].target.getAttribute('data-yt-label');
                if (label) { var span = btn.querySelector('.yt-label'); if (span) span.textContent = label; }
                var label = entries[i].target.getAttribute('data-yt-label');
                if (label) { var span = btn.querySelector('.yt-label'); if (span) span.textContent = label; }
            }
        }
    }, { threshold: 0.3 });
    for (var i = 0; i < sections.length; i++) {
        observer.observe(sections[i]);
    }
})();
</script>
