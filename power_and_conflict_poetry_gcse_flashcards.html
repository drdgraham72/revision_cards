  b.onclick = () => {
    activePoem = p;
    poemFilterEl.querySelectorAll('.poem-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  };
  poemFilterEl.appendChild(b);
});

THEMES.forEach(t => {
  const b = document.createElement('button');
  b.className = 'filter-btn theme-btn' + (t === 'All themes' ? ' active' : '');
  b.textContent = t;
  b.onclick = () => {
    activeTheme = t;
    themeFilterEl.querySelectorAll('.theme-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  };
  themeFilterEl.appendChild(b);
});

function render() {
  gridEl.innerHTML = '';
  let filtered = cards;
  if (activePoem !== 'All poems') filtered = filtered.filter(c => c.poem === activePoem);
  if (activeTheme !== 'All themes') filtered = filtered.filter(c => c.themes.includes(activeTheme));
  counterEl.textContent = filtered.length + ' card' + (filtered.length !== 1 ? 's' : '');
  filtered.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    const pillsHTML = c.themes.map(t => `<span class="theme-pill ${t}">${t}</span>`).join('');
    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="poem-title">${c.poem}</div>
          <div class="poet-name">${c.poet}</div>
        </div>
        <div class="theme-pills">${pillsHTML}</div>
      </div>
      <div class="mnemonic">&#9670; ${c.mnemonic}</div>
      <div class="quote">"${c.quote}"</div>
      <div class="back">
        <div class="insight">${c.insight}</div>
        <div class="compare-box">
          <div class="compare-label">&#8644; Compare with</div>
          ${c.compare}
        </div>
      </div>
      <div class="tap-hint">tap to reveal analysis</div>
    `;
    card.onclick = () => {
      card.classList.toggle('flipped');
      card.querySelector('.tap-hint').textContent = card.classList.contains('flipped') ? 'tap to hide' : 'tap to reveal analysis';
    };
    gridEl.appendChild(card);
  });
}
render();
</script>

<script>
(function() {
    var btn = document.querySelector('.yt-link');
    if (!btn) return;
    var defaultHref = btn.href;
    var sections = document.querySelectorAll('[data-yt]');
    if (sections.length === 0) return;
    var observer = new IntersectionObserver(function(entries) {
        for (var i = 0; i < entries.length; i++) {
            if (entries[i].isIntersecting) {
                var q = entries[i].target.getAttribute('data-yt');
                btn.href = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q);
                var label = entries[i].target.getAttribute('data-yt-label');
                if (label) { var span = btn.querySelector('.yt-label'); if (span) span.textContent = label; }
                var label = entries[i].target.getAttribute('data-yt-label');
                if (label) { var span = btn.querySelector('.yt-label'); if (span) span.textContent = label; }
                var label = entries[i].target.getAttribute('data-yt-label');
                if (label) { var span = btn.querySelector('.yt-label'); if (span) span.textContent = label; }
                var label = entries[i].target.getAttribute('data-yt-label');
                if (label) { var span = btn.querySelector('.yt-label'); if (span) span.textContent = label; }
            }
        }
    }, { threshold: 0.3 });
    for (var i = 0; i < sections.length; i++) {
        observer.observe(sections[i]);
    }
})();
</script>
